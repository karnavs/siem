name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write # required for OIDC -> AWS role assumption
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: backend
        run: |
          docker build -t "${{ vars.ECR_BACKEND_REPO }}:${{ github.sha }}" -t "${{ vars.ECR_BACKEND_REPO }}:latest" .
          docker push "${{ vars.ECR_BACKEND_REPO }}:${{ github.sha }}"
          docker push "${{ vars.ECR_BACKEND_REPO }}:latest"

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          docker build \
            -t "${{ vars.ECR_FRONTEND_REPO }}:${{ github.sha }}" -t "${{ vars.ECR_FRONTEND_REPO }}:latest" \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.PUBLIC_API_URL }}" .
          docker push "${{ vars.ECR_FRONTEND_REPO }}:${{ github.sha }}"
          docker push "${{ vars.ECR_FRONTEND_REPO }}:latest"

      - name: Force new ECS deployment — backend
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "sentrygrid-production-backend" \
            --force-new-deployment

      - name: Force new ECS deployment — frontend
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "sentrygrid-production-frontend" \
            --force-new-deployment

      - name: Wait for backend service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "sentrygrid-production-backend"

      - name: Wait for frontend service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "sentrygrid-production-frontend"
